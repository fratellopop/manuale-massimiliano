<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manuale personale di Massimiliano</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Manuale Max">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --bg2: #161b27;
    --bg3: #1e2535;
    --card: #1e2535;
    --card2: #252d3f;
    --border: #2e3a52;
    --accent: #4f8ef7;
    --accent2: #6ee7b7;
    --accent3: #f472b6;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --transition: 0.2s ease;
    --sidebar-w: 220px;
  }
  html { font-size: 15px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ===== LAYOUT ===== */
  #app { display: flex; flex: 1; min-height: 100vh; }

  /* ===== SIDEBAR ===== */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    transition: transform var(--transition);
    overflow-y: auto;
  }
  #sidebar-logo {
    padding: 22px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-logo h1 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.02em;
    line-height: 1.3;
  }
  #sidebar-logo p {
    font-size: 0.72rem;
    color: var(--text3);
    margin-top: 3px;
  }
  #sidebar-date {
    padding: 10px 20px;
    font-size: 0.75rem;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
  }
  #sidebar nav { flex: 1; padding: 10px 0; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 0;
    font-size: 0.85rem;
    color: var(--text2);
    transition: background var(--transition), color var(--transition);
    border-left: 3px solid transparent;
    user-select: none;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active {
    background: rgba(79,142,247,0.12);
    color: var(--accent);
    border-left-color: var(--accent);
    font-weight: 600;
  }
  .nav-item .icon { font-size: 1.1rem; width: 22px; text-align: center; }
  #sidebar-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #sidebar-footer button {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    font-size: 0.78rem;
    cursor: pointer;
    transition: background var(--transition);
  }
  #sidebar-footer button:hover { background: var(--card2); color: var(--text); }

  /* ===== MAIN ===== */
  #main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  #topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  #topbar h2 { font-size: 1.05rem; font-weight: 600; color: var(--text); }
  #topbar .topbar-right { display: flex; gap: 10px; align-items: center; }
  #hamburger {
    display: none;
    background: none;
    border: none;
    color: var(--text);
    font-size: 1.4rem;
    cursor: pointer;
    padding: 4px;
  }
  #content { padding: 28px; flex: 1; max-width: 1100px; }

  /* ===== CARDS ===== */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

  /* ===== SECTION HEADER ===== */
  .section-header {
    margin-bottom: 22px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .section-header h2 {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-header p { font-size: 0.85rem; color: var(--text2); margin-top: 5px; }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: 9px;
    border: none;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all var(--transition);
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3a7de0; }
  .btn-success { background: var(--accent2); color: #0f1117; }
  .btn-success:hover { background: #4dd4a0; }
  .btn-warn { background: var(--warn); color: #0f1117; }
  .btn-warn:hover { background: #d97706; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #dc2626; }
  .btn-ghost {
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--card2); color: var(--text); }
  .btn-sm { padding: 6px 12px; font-size: 0.78rem; }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }

  /* ===== CHECKLIST ===== */
  .checklist { display: flex; flex-direction: column; gap: 8px; }
  .check-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg3);
    border-radius: 10px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background var(--transition);
    user-select: none;
  }
  .check-item:hover { background: var(--card2); }
  .check-item.checked {
    background: rgba(110,231,183,0.08);
    border-color: rgba(110,231,183,0.3);
  }
  .check-item.checked .check-label { text-decoration: line-through; color: var(--text3); }
  .check-box {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all var(--transition);
    font-size: 0.8rem;
  }
  .check-item.checked .check-box {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #0f1117;
  }
  .check-label { font-size: 0.9rem; color: var(--text); }
  .check-sub { font-size: 0.75rem; color: var(--text3); margin-top: 2px; }

  /* ===== BADGE ===== */
  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .badge-blue { background: rgba(79,142,247,0.15); color: var(--accent); }
  .badge-green { background: rgba(110,231,183,0.15); color: var(--accent2); }
  .badge-pink { background: rgba(244,114,182,0.15); color: var(--accent3); }
  .badge-warn { background: rgba(245,158,11,0.15); color: var(--warn); }
  .badge-red { background: rgba(239,68,68,0.15); color: var(--danger); }

  /* ===== INPUTS ===== */
  input[type="text"], input[type="number"], input[type="date"],
  textarea, select {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    padding: 9px 13px;
    font-size: 0.88rem;
    width: 100%;
    transition: border-color var(--transition);
    font-family: inherit;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }
  textarea { resize: vertical; min-height: 90px; }
  label { font-size: 0.8rem; color: var(--text2); display: block; margin-bottom: 5px; }
  .form-group { margin-bottom: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  /* ===== PROGRESS BAR ===== */
  .progress-wrap { background: var(--bg3); border-radius: 8px; height: 8px; overflow: hidden; }
  .progress-bar { height: 100%; border-radius: 8px; background: var(--accent); transition: width 0.4s ease; }
  .progress-bar.green { background: var(--accent2); }
  .progress-bar.pink { background: var(--accent3); }

  /* ===== STAT BOX ===== */
  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .stat-box .stat-label { font-size: 0.75rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-box .stat-value { font-size: 1.6rem; font-weight: 700; color: var(--text); }
  .stat-box .stat-sub { font-size: 0.78rem; color: var(--text2); }

  /* ===== WATER TRACKER ===== */
  .water-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .water-cup {
    width: 44px; height: 48px;
    border-radius: 8px;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all var(--transition);
    background: var(--bg3);
  }
  .water-cup.filled { background: rgba(79,142,247,0.2); border-color: var(--accent); }

  /* ===== SKINCARE PRODUCT CARD ===== */
  .product-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .product-card h3 { font-size: 0.92rem; font-weight: 700; color: var(--text); }
  .product-card .prod-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .product-card .prod-info { font-size: 0.8rem; color: var(--text2); }
  .product-card .prod-warn {
    font-size: 0.78rem;
    color: var(--warn);
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 7px;
    padding: 6px 10px;
    display: flex; gap: 6px; align-items: flex-start;
  }

  /* ===== WEEK CALENDAR ===== */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }
  .day-col {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 160px;
  }
  .day-col.today { border-color: var(--accent); background: rgba(79,142,247,0.06); }
  .day-col .day-name {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    text-align: center;
  }
  .day-col.today .day-name { color: var(--accent); }
  .day-col .day-num {
    font-size: 1.1rem;
    font-weight: 700;
    text-align: center;
    color: var(--text);
    margin-bottom: 4px;
  }
  .day-col.today .day-num { color: var(--accent); }
  .day-event {
    font-size: 0.7rem;
    padding: 3px 6px;
    border-radius: 5px;
    line-height: 1.3;
  }
  .day-event.skin { background: rgba(244,114,182,0.15); color: var(--accent3); }
  .day-event.train { background: rgba(110,231,183,0.15); color: var(--accent2); }
  .day-event.led { background: rgba(245,158,11,0.15); color: var(--warn); }
  .day-event.patch { background: rgba(79,142,247,0.15); color: var(--accent); }

  /* ===== RECIPE CARD ===== */
  .recipe-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .recipe-card h3 { font-size: 0.95rem; font-weight: 700; color: var(--text); }
  .recipe-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .recipe-meta span {
    font-size: 0.75rem;
    padding: 3px 9px;
    border-radius: 20px;
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .recipe-card .recipe-note { font-size: 0.8rem; color: var(--text2); }

  /* ===== TABLE ===== */
  .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .data-table th {
    background: var(--bg3);
    color: var(--text2);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .data-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--bg3); }
  .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }

  /* ===== TOAST ===== */
  #toast {
    position: fixed;
    bottom: 28px; right: 28px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 0.88rem;
    color: var(--text);
    box-shadow: var(--shadow);
    z-index: 999;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s ease;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* ===== OVERLAY SIDEBAR MOBILE ===== */
  #sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 99;
  }

  /* ===== PRINT ===== */
  @media print {
    #sidebar, #topbar, #sidebar-overlay, #toast, .no-print { display: none !important; }
    #main { margin-left: 0 !important; }
    body { background: #fff; color: #000; }
    .card, .product-card, .recipe-card { border: 1px solid #ccc; box-shadow: none; background: #fff; }
    .card-title, .section-header h2 { color: #000; }
    .check-label, .check-sub, .stat-value, .stat-label, .stat-sub { color: #000 !important; }
    .day-col { border: 1px solid #ccc; background: #fff; }
    .day-name, .day-num { color: #000 !important; }
    .data-table th, .data-table td { color: #000; border-color: #ccc; }
    .badge { border: 1px solid #ccc; }
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 900px) {
    :root { --sidebar-w: 0px; }
    #sidebar {
      width: 240px;
      transform: translateX(-100%);
    }
    #sidebar.open { transform: translateX(0); }
    #sidebar-overlay.show { display: block; }
    #hamburger { display: block; }
    #main { margin-left: 0; }
    #content { padding: 18px; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .week-grid { grid-template-columns: repeat(4, 1fr); }
    .form-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 500px) {
    .week-grid { grid-template-columns: repeat(2, 1fr); }
    .grid-auto { grid-template-columns: 1fr; }
  }

  /* ===== MISC ===== */
  .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
  .text-muted { color: var(--text2); font-size: 0.85rem; }
  .text-small { font-size: 0.78rem; color: var(--text3); }
  .mt-8 { margin-top: 8px; }
  .mt-12 { margin-top: 12px; }
  .mt-16 { margin-top: 16px; }
  .mt-20 { margin-top: 20px; }
  .mb-8 { margin-bottom: 8px; }
  .mb-12 { margin-bottom: 12px; }
  .mb-16 { margin-bottom: 16px; }
  .flex { display: flex; }
  .flex-wrap { flex-wrap: wrap; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .gap-16 { gap: 16px; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .hidden { display: none !important; }
  .rule-item {
    display: flex; gap: 8px; align-items: flex-start;
    font-size: 0.83rem; color: var(--text2);
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
  }
  .rule-item:last-child { border-bottom: none; }
  .rule-icon { font-size: 0.9rem; margin-top: 1px; }
  .food-list { display: flex; flex-wrap: wrap; gap: 7px; }
  .food-tag {
    padding: 4px 11px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 500;
  }
  .food-tag.green { background: rgba(110,231,183,0.12); color: var(--accent2); border: 1px solid rgba(110,231,183,0.25); }
  .food-tag.red { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
  .shopping-section { margin-bottom: 20px; }
  .shopping-section h3 { font-size: 0.88rem; font-weight: 700; color: var(--text2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .add-item-row { display: flex; gap: 8px; margin-top: 10px; }
  .add-item-row input { flex: 1; }
  .health-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .health-item h3 { font-size: 0.9rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .health-dates { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .chart-wrap { position: relative; height: 220px; margin-top: 10px; }
  .mood-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  .mood-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 2px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all var(--transition);
  }
  .mood-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,0.1); }
  .steps-display {
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--accent2);
    text-align: center;
    padding: 10px 0;
  }
  .steps-goal { font-size: 0.8rem; color: var(--text3); text-align: center; margin-top: -4px; }
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div id="sidebar-logo">
      <h1>Manuale<br>di Massimiliano</h1>
      <p>Wellness &amp; Lifestyle</p>
    </div>
    <div id="sidebar-date" id="sidebarDate"></div>
    <nav id="nav">
      <div class="nav-item active" data-section="dashboard" onclick="showSection('dashboard')">
        <span class="icon">🏠</span> Dashboard Oggi
      </div>
      <div class="nav-item" data-section="skincare-prodotti" onclick="showSection('skincare-prodotti')">
        <span class="icon">✨</span> Skincare – Prodotti
      </div>
      <div class="nav-item" data-section="skincare-calendario" onclick="showSection('skincare-calendario')">
        <span class="icon">📅</span> Skincare – Calendario
      </div>
      <div class="nav-item" data-section="alimentazione" onclick="showSection('alimentazione')">
        <span class="icon">🥗</span> Alimentazione
      </div>
      <div class="nav-item" data-section="spesa" onclick="showSection('spesa')">
        <span class="icon">🛒</span> Lista della Spesa
      </div>
      <div class="nav-item" data-section="friggitrice" onclick="showSection('friggitrice')">
        <span class="icon">🍗</span> Friggitrice ad Aria
      </div>
      <div class="nav-item" data-section="allenamento" onclick="showSection('allenamento')">
        <span class="icon">💪</span> Allenamento

    DATA = raw ? JSON.parse(raw) : {};
  } catch(e) { DATA = {}; }
  // defaults
  if (!DATA.daily) DATA.daily = {};
  if (!DATA.shopping) DATA.shopping = defaultShopping();
  if (!DATA.progressi) DATA.progressi = [];
  if (!DATA.salute) DATA.salute = defaultSalute();
  if (!DATA.note) DATA.note = '';

  if (!DATA.steps_today) DATA.steps_today = '';
  if (!DATA.water_today) DATA.water_today = 0;
}

function saveData() {
  localStorage.setItem(STORE_KEY, JSON.stringify(DATA));
}

function todayKey() {
  return new Date().toISOString().slice(0,10);

function showSection(id) {
  currentSection = id;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.section === id);
  });
  document.getElementById('topbar-title').textContent = SECTION_TITLES[id] || id;
  renderSection(id);
  closeSidebar();
}

function renderSection(id) {
  const c = document.getElementById('content');
  switch(id) {
    case 'dashboard': c.innerHTML = renderDashboard(); break;
    case 'skincare-prodotti': c.innerHTML = renderSkincareProducts(); break;
    case 'skincare-calendario': c.innerHTML = renderSkincareCalendar(); break;
    case 'alimentazione': c.innerHTML = renderAlimentazione(); break;
    case 'spesa': c.innerHTML = renderSpesa(); break;
    case 'friggitrice': c.innerHTML = renderFriggitrice(); break;
    case 'allenamento': c.innerHTML = renderAllenamento(); break;
    case 'progressi': c.innerHTML = renderProgressi(); break;
    case 'salute': c.innerHTML = renderSalute(); break;
    case 'note': c.innerHTML = renderNote(); break;
    default: c.innerHTML = '<p>Sezione non trovata.</p>';
  }
  afterRender(id);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

// ============================================================
// TOAST
// ============================================================
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

function addSkinExtra() {
  const input = document.getElementById('skin-extra-input');
  const val = input.value.trim();
  if (!val) return;
  const day = ensureDay();
  if (!day.skincare_extra) day.skincare_extra = [];
  day.skincare_extra.push(val);
  saveData();
  input.value = '';
  // Re-render only the extra list
  const list = document.getElementById('skin-extra-list');
  if (list) {
    list.innerHTML = (day.skincare_extra||[]).map((item,i) => `
      <div class="check-item checked">
        <div class="check-box" style="background:var(--accent2);border-color:var(--accent2);color:#0f1117">✓</div>
        <div class="check-label" style="flex:1">${item}</div>
        <button class="btn btn-ghost btn-sm" style="padding:2px 8px" onclick="event.stopPropagation();removeSkinExtra(${i})">✕</button>
      </div>`).join('');
  }
  showToast(`✅ "${val}" aggiunto alla skincare di oggi`);
}

function removeSkinExtra(idx) {
  const day = ensureDay();
  if (!day.skincare_extra) return;
  day.skincare_extra.splice(idx, 1);
  saveData();
  renderSection('dashboard');
}

function setDayField(field, value) {
  const day = ensureDay();
  day[field] = value;
  saveData();
}

function toggleDayCheck(field, id, el) {
  const day = ensureDay();
  if (!day[field]) day[field] = [];
  const idx = day[field].indexOf(id);
  if (idx === -1) {
    day[field].push(id);
    el.classList.add('checked');
    el.querySelector('.check-box').textContent = '✓';
    el.querySelector('.check-label').style.textDecoration = 'line-through';
  } else {
    day[field].splice(idx, 1);
    el.classList.remove('checked');
    el.querySelector('.check-box').textContent = '';
    el.querySelector('.check-label').style.textDecoration = '';
  }
  saveData();
}

function setWater(n) {
  const day = ensureDay();
  day.water = n;
  saveData();
  document.getElementById('water-count').textContent = `${n} / 8`;
  document.getElementById('water-bar').style.width = `${Math.min(100, n/8*100)}%`;
  document.querySelectorAll('.water-cup').forEach((cup, i) => {
    cup.classList.toggle('filled', i < n);
  });
}

function setMood(m, el) {
  const day = ensureDay();
  day.mood = m;
  saveData();
  el.closest('.mood-row').querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function setEnergia(e, el) {
  const day = ensureDay();
  day.energia = e;
  saveData();
  el.closest('.mood-row').querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function toggleCompleted() {
  const day = ensureDay();
  day.completed = !day.completed;
  saveData();
  showToast(day.completed ? '🎉 Ottimo lavoro! Giornata completata.' : 'Giornata de-completata.');
  renderSection('dashboard');
}

function resetDay() {
  if (!confirm('Resettare tutti i dati di oggi? L\'azione non è reversibile.')) return;
  const k = todayKey();
  delete DATA.daily[k];
  saveData();
  showToast('🔄 Giornata resettata.');
  renderSection('dashboard');
}

  saveData();
  el.classList.toggle('checked');
  const box = el.querySelector('.check-box');

          <option>😴 Stanco</option>
          <option>😐 Neutro</option>
          <option>🙂 Ok</option>
          <option>😊 Bene</option>
          <option>🔥 Ottimo</option>
        </select>
      </div>
      <div class="form-group">
        <label>Energia</label>
        <select id="p-energia">
          <option value="">–</option>
          <option>⚡ Bassa</option>
          <option>⚡⚡ Media</option>
          <option>⚡⚡⚡ Alta</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Note</label>
      <input type="text" id="p-note" placeholder="Note libere...">
    </div>
    <div class="form-group">
      <label>Nome file foto (opzionale)</label>
      <input type="text" id="p-foto" placeholder="es. foto_luglio_2026.jpg">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addProgressi()">+ Aggiungi misurazione</button>
    </div>
  </div>

  <!-- GRAFICI -->
  ${DATA.progressi.length >= 2 ? `
  <div class="grid-2 mb-16">
    <div class="card">
      <div class="card-title"><span class="dot"></span>Peso nel tempo</div>
      <div class="chart-wrap"><canvas id="chart-peso"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title"><span class="dot" style="background:var(--accent3)"></span>Girovita nel tempo</div>
      <div class="chart-wrap"><canvas id="chart-girovita"></canvas></div>
    </div>
  </div>` : `<div class="card mb-16"><p class="text-muted">Aggiungi almeno 2 misurazioni per vedere i grafici.</p></div>`}

  <!-- TABELLA STORICO -->
  <div class="card">
    <div class="card-title"><span class="dot" style="background:var(--accent2)"></span>Storico misurazioni</div>
    ${DATA.progressi.length === 0 ? '<p class="text-muted">Nessuna misurazione ancora.</p>' : `
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Data</th><th>Peso</th><th>Girovita</th><th>Passi</th>
            <th>Umore</th><th>Energia</th><th>Note</th><th>Foto</th><th></th>
          </tr>
        </thead>
        <tbody>
          ${[...DATA.progressi].reverse().map((p,i) => `
            <tr>
              <td>${p.data}</td>
              <td>${p.peso ? p.peso+'kg' : '–'}</td>
              <td>${p.girovita ? p.girovita+'cm' : '–'}</td>
              <td>${p.passi || '–'}</td>
              <td>${p.umore || '–'}</td>
              <td>${p.energia || '–'}</td>
              <td>${p.note || '–'}</td>
              <td>${p.foto || '–'}</td>
              <td><button class="btn btn-ghost btn-sm" onclick="removeProgressi(${DATA.progressi.length-1-i})">✕</button></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`}
  </div>`;
}

function addProgressi() {
  const entry = {
    data: document.getElementById('p-data').value,
    peso: document.getElementById('p-peso').value,
    girovita: document.getElementById('p-girovita').value,
    passi: document.getElementById('p-passi').value,
    umore: document.getElementById('p-umore').value,
    energia: document.getElementById('p-energia').value,
    note: document.getElementById('p-note').value,
    foto: document.getElementById('p-foto').value
  };
  if (!entry.data) { showToast('⚠️ Inserisci almeno la data.'); return; }
  DATA.progressi.push(entry);
  saveData();
  showToast('✅ Misurazione salvata!');
  renderSection('progressi');
}

function removeProgressi(idx) {
  DATA.progressi.splice(idx, 1);
  saveData();
  renderSection('progressi');
}

function renderCharts() {
  if (DATA.progressi.length < 2) return;
  const sorted = [...DATA.progressi].sort((a,b) => a.data.localeCompare(b.data));
  const labels = sorted.map(p => p.data);
  const pesi = sorted.map(p => parseFloat(p.peso) || null);
  const giri = sorted.map(p => parseFloat(p.girovita) || null);

  const chartOpts = (label, data, color) => ({
    type: 'line',
    data: {
      labels,
      datasets: [{
        label,
        data,
        borderColor: color,
        backgroundColor: color + '22',
        tension: 0.3,
        fill: true,
        pointBackgroundColor: color,
        pointRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#94a3b8', font: { size: 10 } }, grid: { color: '#2e3a52' } },
        y: { ticks: { color: '#94a3b8', font: { size: 10 } }, grid: { color: '#2e3a52' } }
      }
    }
  });

  const cp = document.getElementById('chart-peso');
  const cg = document.getElementById('chart-girovita');
  if (cp) new Chart(cp, chartOpts('Peso (kg)', pesi, '#4f8ef7'));
  if (cg) new Chart(cg, chartOpts('Girovita (cm)', giri, '#f472b6'));
}

// ============================================================
// SALUTE
// ============================================================
function renderSalute() {
  return `
  <div class="section-header">
    <h2>🏥 Salute & Controlli</h2>
    <p>Tieni traccia di visite mediche e controlli periodici</p>
  </div>
  <div style="display:flex;flex-direction:column;gap:14px">
    ${DATA.salute.map((item, i) => `
      <div class="health-item">
        <h3>
          ${item.icon} ${item.nome}
          <span class="badge ${item.fatto ? 'badge-green' : 'badge-warn'}" style="margin-left:auto">
            ${item.fatto ? '✅ Fatto' : '⏳ Da fare'}
          </span>
        </h3>
        <div class="health-dates">
          <div class="form-group" style="margin:0">
            <label>Ultimo controllo</label>
            <input type="date" value="${item.ultimo||''}"
              onchange="updateSalute(${i},'ultimo',this.value)">
          </div>
          <div class="form-group" style="margin:0">
            <label>Prossimo controllo</label>
            <input type="date" value="${item.prossimo||''}"
              onchange="updateSalute(${i},'prossimo',this.value)">
          </div>
        </div>
        <div class="form-group" style="margin:0">
          <label>Note</label>
          <input type="text" placeholder="Note, risultati, promemoria..."
            value="${item.note||''}"
            onchange="updateSalute(${i},'note',this.value)">
        </div>
        <div>
          <button class="btn ${item.fatto ? 'btn-ghost' : 'btn-success'} btn-sm"
            onclick="toggleSalute(${i})">
            ${item.fatto ? '↩️ Segna come da fare' : '✅ Segna come fatto'}
          </button>
        </div>
      </div>`).join('')}
  </div>`;
}

function updateSalute(idx, field, value) {
  DATA.salute[idx][field] = value;
  saveData();
}

function toggleSalute(idx) {
  DATA.salute[idx].fatto = !DATA.salute[idx].fatto;
  saveData();
  renderSection('salute');
  showToast(DATA.salute[idx].fatto ? '✅ Controllo completato!' : '↩️ Segnato come da fare');
}

// ============================================================
// NOTE
// ============================================================
function renderNote() {
  return `
  <div class="section-header">
    <h2>📝 Note Personali</h2>
    <p>Area libera – cambiamenti, dubbi, cose da chiedere al medico</p>
  </div>
  <div class="card">
    <div class="card-title"><span class="dot"></span>Le tue note</div>
    <textarea id="note-area" style="min-height:400px;font-size:0.9rem;line-height:1.6"
      placeholder="Scrivi qui tutto ciò che vuoi ricordare: cambiamenti nella routine, dubbi, cose da chiedere al medico, idee, osservazioni sulla pelle, progressi notati..."
      onchange="saveNote(this.value)">${DATA.note||''}</textarea>
    <div class="btn-row no-print">
      <button class="btn btn-primary" onclick="saveNote(document.getElementById('note-area').value);showToast('✅ Note salvate!')">💾 Salva note</button>
    </div>
  </div>`;
}

function saveNote(val) {
  DATA.note = val;
  saveData();
}

// ============================================================
// EXPORT / IMPORT
// ============================================================
function exportData() {
  const blob = new Blob([JSON.stringify(DATA, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `manuale_massimiliano_${todayKey()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('⬇️ Dati esportati!');
}

function importData() {
  document.getElementById('import-file').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (confirm('Importare i dati? Sovrascriverà i dati attuali.')) {
        DATA = imported;
        saveData();
        showToast('✅ Dati importati con successo!');
        renderSection(currentSection);
      }
    } catch(err) {
      showToast('❌ File non valido.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ============================================================
// AFTER RENDER HOOKS
// ============================================================
function afterRender(id) {
  if (id === 'progressi') {
    setTimeout(renderCharts, 50);
  }
}

// ============================================================
// INIT
// ============================================================
function init() {
  loadData();
  // Set sidebar date
  const now = new Date();
  const dateEl = document.getElementById('sidebarDate');
  if (dateEl) {
    dateEl.textContent = now.toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long' });
  }
  renderSection('dashboard');
}

document.addEventListener('DOMContentLoaded', init);

// ============================================================
// SERVICE WORKER REGISTRATION
// ============================================================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
